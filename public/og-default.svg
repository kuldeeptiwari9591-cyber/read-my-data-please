<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#11121a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark: stylised PDF -->
  <g transform="translate(90, 90)">
    <rect x="0" y="0" width="86" height="108" rx="14" fill="url(#accent)"/>
    <rect x="14" y="22" width="58" height="6" rx="3" fill="#0A0A0F" opacity="0.85"/>
    <rect x="14" y="38" width="44" height="6" rx="3" fill="#0A0A0F" opacity="0.7"/>
    <rect x="14" y="54" width="58" height="6" rx="3" fill="#0A0A0F" opacity="0.55"/>
    <rect x="14" y="70" width="32" height="6" rx="3" fill="#0A0A0F" opacity="0.4"/>
  </g>

  <text x="200" y="172" font-family="'Space Grotesk', system-ui, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF">CrispPDF</text>

  <!-- Headline -->
  <text x="90" y="340" font-family="'Space Grotesk', system-ui, sans-serif" font-size="78" font-weight="700" fill="#FFFFFF">Every PDF tool</text>
  <text x="90" y="430" font-family="'Space Grotesk', system-ui, sans-serif" font-size="78" font-weight="700" fill="url(#accent)">you need.</text>

  <!-- Tagline -->
  <text x="90" y="500" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="400" fill="#94A3B8">Free. Crisp. Fast.  ·  No signup. No watermarks.</text>

  <!-- Pills -->
  <g transform="translate(90, 540)" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="500">
    <g>
      <rect x="0" y="0" width="120" height="40" rx="20" fill="#6366F1" fill-opacity="0.15" stroke="#6366F1" stroke-opacity="0.4"/>
      <text x="60" y="26" text-anchor="middle" fill="#A5B4FC">40 tools</text>
    </g>
    <g transform="translate(136, 0)">
      <rect x="0" y="0" width="140" height="40" rx="20" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.4"/>
      <text x="70" y="26" text-anchor="middle" fill="#D8B4FE">0 signups</text>
    </g>
    <g transform="translate(292, 0)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-opacity="0.4"/>
      <text x="90" y="26" text-anchor="middle" fill="#6EE7B7">privacy-first</text>
    </g>
  </g>
</svg>
